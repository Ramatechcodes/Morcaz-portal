<h2>Student Application</h2>

<form id="applyForm" enctype="multipart/form-data">

<label>Full Name / الاسم الكامل</label>
<input name="name" required>

<label>Email / البريد الإلكتروني</label>
<input name="email">

<label>Gender / الجنس</label>
<select name="gender">
<option>Male / ذكر</option>
<option>Female / أنثى</option>
</select>

<label>NIN / رقم الهوية</label>
<input name="nin">

<label>State of Origin / ولاية الأصل</label>
<input name="origin">

<label>State of Residence / ولاية السكن</label>
<input name="residence">

<label>Phone / رقم الهاتف</label>
<input name="phone">

<h3>Previous School / المدرسة السابقة</h3>

<input name="previousSchool">

<h3>Class Applying For / الصف المطلوب</h3>

<select name="classApplying">
<option>Ibtidaahi</option>
<option>Idaadii</option>
<option>Tamheedii</option>
<option>Taojeehi</option>
</select>

<h3>Parent / Guardian</h3>

<input name="parentName">

<label>Upload Passport / صورة شخصية</label>
<input type="file" name="passport">

<button>Submit Application</button>

</form>
